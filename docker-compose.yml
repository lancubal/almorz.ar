services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"   # el nginx principal de luna-lancuba.dev hace proxy a este puerto
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8081:3001"   # el nginx externo hace proxy a este puerto
    volumes:
      - ./db.json:/app/db.json   # bind mount → datos persisten en el host
                                  # en AWS: reemplazar por un volumen EFS
    restart: unless-stopped
