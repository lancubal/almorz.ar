# ── Snippet para el nginx de luna-lancuba.dev ─────────────────────────────────
# Agregá esto dentro del bloque server {} de tu sitio principal.
# Asumimos que almorz.ar corre en Docker en el mismo servidor (localhost:8080 y 8081).

    # Redirigir /almorzar sin trailing slash
    location = /almorzar {
        return 301 /almorzar/;
    }

    # API → json-server
    location /almorzar/api/ {
        proxy_pass         http://localhost:8081/;   # puerto del contenedor api
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # App Angular (el contenedor web maneja el routing fallback internamente)
    location /almorzar/ {
        proxy_pass         http://localhost:8080/;   # puerto del contenedor web
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
# ──────────────────────────────────────────────────────────────────────────────
