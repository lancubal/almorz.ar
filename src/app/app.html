@if(!currentUser() && userIsReady() && !isAdminRoute()) {
  <app-user-setup />
  }

  <div class="app-container">
    <header class="app-header">
      <div class="header-top">
        <h1 class="app-logo"><span class="logo-main">almorz</span><span class="logo-tld">.ar</span></h1>
        @if(currentUser()) {
          <div class="user-chip">
            <span class="user-name" aria-label="Usuario actual">{{ currentUser()!.displayName }}</span>
            <button class="logout-btn" type="button" (click)="logout()" aria-label="Cambiar usuario">Cambiar</button>
          </div>
          }
      </div>
    </header>

    <nav class="app-nav" aria-label="Navegación principal">
      <a class="nav-tab" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" aria-hidden="true">
          <circle cx="12" cy="12" r="9" />
          <path d="M12 3v9" />
          <path d="M12 12l5.5 3.2" />
          <path d="M12 12l-5.5 3.2" />
        </svg>
        <span class="nav-label">Ruleta</span>
      </a>
      <a class="nav-tab" routerLink="/visits" routerLinkActive="active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
          <path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
        </svg>
        <span class="nav-label">Registrar</span>
      </a>
      <a class="nav-tab" routerLink="/history" routerLinkActive="active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" aria-hidden="true">
          <circle cx="12" cy="12" r="9" />
          <path d="M12 7v5l3.5 3.5" />
        </svg>
        <span class="nav-label">Historial</span>
      </a>
      <a class="nav-tab" routerLink="/stats" routerLinkActive="active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" aria-hidden="true">
          <path d="M3 20h18M7 20v-8M12 20V6M17 20v-4" />
        </svg>
        <span class="nav-label">Stats</span>
      </a>
      <a class="nav-tab" routerLink="/places" routerLinkActive="active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 2C8.69 2 6 4.69 6 8c0 5 6 13 6 13s6-8 6-13c0-3.31-2.69-6-6-6z" />
          <circle cx="12" cy="8" r="2.5" />
        </svg>
        <span class="nav-label">Lugares</span>
      </a>
    </nav>

    <main class="app-main">
      <router-outlet />
    </main>
  </div>
