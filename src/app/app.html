@if(!currentUser() && userIsReady() && !isAdminRoute()) {
  <app-user-setup />
  }

  <div class="app-container">
    <header class="app-header">
      <div class="header-top">
        <div>
          <h1>🍽️ Almorz.ar</h1>
          <p class="app-subtitle">¿Dónde almorzamos hoy?</p>
        </div>
        @if(currentUser()) {
          <div class="user-chip">
            <span class="user-name" aria-label="Usuario actual">{{ currentUser()!.displayName }}</span>
            <button class="logout-btn" type="button" (click)="logout()" aria-label="Cambiar usuario">Cambiar</button>
          </div>
          }
      </div>
    </header>

    <nav class="app-nav" aria-label="Navegación principal">
      <a class="nav-tab" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <span class="nav-icon" aria-hidden="true">🎰</span>
        <span class="nav-label">Ruleta</span>
      </a>
      <a class="nav-tab" routerLink="/visits" routerLinkActive="active">
        <span class="nav-icon" aria-hidden="true">📝</span>
        <span class="nav-label">Registrar</span>
      </a>
      <a class="nav-tab" routerLink="/history" routerLinkActive="active">
        <span class="nav-icon" aria-hidden="true">📋</span>
        <span class="nav-label">Historial</span>
      </a>
      <a class="nav-tab" routerLink="/stats" routerLinkActive="active">
        <span class="nav-icon" aria-hidden="true">📊</span>
        <span class="nav-label">Stats</span>
      </a>
      <a class="nav-tab" routerLink="/places" routerLinkActive="active">
        <span class="nav-icon" aria-hidden="true">📍</span>
        <span class="nav-label">Lugares</span>
      </a>
    </nav>

    <main class="app-main">
      <router-outlet />
    </main>
  </div>
