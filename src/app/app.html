<div class="app-container">
  <header class="app-header">
    <h1>🍽️ Almorz.ar</h1>
    <p class="app-subtitle">¿Dónde almorzamos hoy?</p>
  </header>

  <nav class="app-nav">
    <button class="nav-tab" [class.active]="activeTab() === 'roulette'" (click)="setActiveTab('roulette')"
      type="button">
      🎰 Ruleta
    </button>
    <button class="nav-tab" [class.active]="activeTab() === 'visits'" (click)="setActiveTab('visits')" type="button">
      📝 Registrar Visita
    </button>
    <button class="nav-tab" [class.active]="activeTab() === 'places'" (click)="setActiveTab('places')" type="button">
      📍 Lugares
    </button>
  </nav>

  <main class="app-main">
    @switch(activeTab()) {
      @case('roulette') {
      <app-roulette />
      }
      @case('visits') {
      <app-visit-logger />
      }
      @case('places') {
      <app-places-manager />
      }
      }
  </main>
</div>
