name: Deploy to EC2

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push — web (Angular + nginx)
        run: |
          docker build \
            -t $ECR_REGISTRY/almorz/web:latest \
            -t $ECR_REGISTRY/almorz/web:${{ github.sha }} \
            .
          docker push $ECR_REGISTRY/almorz/web:latest
          docker push $ECR_REGISTRY/almorz/web:${{ github.sha }}

      - name: Build & push — api (json-server)
        run: |
          docker build \
            -f Dockerfile.api \
            -t $ECR_REGISTRY/almorz/api:latest \
            -t $ECR_REGISTRY/almorz/api:${{ github.sha }} \
            .
          docker push $ECR_REGISTRY/almorz/api:latest
          docker push $ECR_REGISTRY/almorz/api:${{ github.sha }}

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ${{ env.AWS_REGION }} \
              | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            docker compose -f docker-compose.prod.yml pull almorz-web almorz-api
            docker compose -f docker-compose.prod.yml up -d almorz-web almorz-api

            docker image prune -f
